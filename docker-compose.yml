name: ecosystem

# One network for all three projects so the cross-service URLs resolve:
#   Transit  --tap-->        rag-monitor (Meridian)
#   Meridian --re-embed-->   order-api   (Hermes)
#   Hermes worker --embed--> embedding-service, --write--> qdrant
#
# This is the orchestration repo. It builds the three component repos, which it
# expects checked out as SIBLINGS of this folder:
#   Documents/
#     atlas/   <- this repo
#     hermes/         <- context ../hermes
#     Transit/        <- context ../Transit
#     meridian/       <- context ../meridian
# Providers are REAL (free-tier NVIDIA NIM); no fakes. Verified 2026-06-14.

services:
  # ---------- Hermes (ingestion + order engine) ----------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  embedding-service:
    build:
      context: ../hermes
      dockerfile: embedding-service/Dockerfile
    # real NVIDIA embeddings (nv-embedqa-e5-v5, 1024-dim) using the free-tier key
    env_file:
      - ../Transit/.env
    environment:
      EMBED_PROVIDER: nvidia
      EMBED_DIM: 1024

  order-api:
    build:
      context: ../hermes
      dockerfile: order-api/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hermes
      DB_USER: hermes
      DB_PASSWORD: hermes
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }

  fulfillment-worker:
    build:
      context: ../hermes
      dockerfile: fulfillment-worker/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hermes
      DB_USER: hermes
      DB_PASSWORD: hermes
      KAFKA_BOOTSTRAP: kafka:29092
      HERMES_EMBEDDING_MODE: http
      HERMES_EMBEDDING_HTTP_BASE_URL: http://embedding-service:8000
      HERMES_EMBEDDING_HTTP_DIMENSION: 1024
      HERMES_VECTORSTORE_MODE: qdrant
      HERMES_VECTORSTORE_QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      order-api: { condition: service_started }
      embedding-service: { condition: service_started }
      qdrant: { condition: service_started }

  # ---------- Transit (AI gateway) ----------
  redis:
    image: redis:7-alpine

  transit:
    build:
      context: ../Transit
    # real provider keys (free-tier NVIDIA NIM / Groq) from Transit's .env
    env_file:
      - ../Transit/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////tmp/transit.db
      MERIDIAN_URL: http://rag-monitor:8002
    ports:
      - "18080:8000"
    depends_on:
      - redis
      - rag-monitor

  # ---------- Meridian (RAG drift monitor) ----------
  rag-monitor:
    build:
      context: ../meridian
    command: uvicorn meridian.rag.service:app --host 0.0.0.0 --port 8002
    environment:
      MERIDIAN_DATA_DIR: /data
      MERIDIAN_HERMES_INGEST_URL: http://order-api:8080/api/ingest
      MERIDIAN_DRIFT_CHECK_INTERVAL_S: 3
      MERIDIAN_REEMBED_CHUNK_COUNT: 30
    ports:
      - "8002:8002"
